<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Claw123 龙虾导航 | OpenClaw 中文一站式生态</title>
    <!-- Tailwind CSS CDN + Font Awesome (icon辅助) + 自定义样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 自定义配置tailwind覆盖主色和暗色支持 -->
    <style>
        /* 自定义科技感 + 龙虾主题变量 */
        :root {
            --primary: #FF6B00;
            --primary-dark: #E05A00;
            --bg-light: #FEF9F0;
            --bg-dark: #0A0C12;
            --card-light: #ffffff;
            --card-dark: #151922;
            --text-light: #1E1E2F;
            --text-dark: #EDEDF0;
        }
        body {
            transition: background-color 0.2s ease, color 0.2s ease;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        /* 可爱标题增强 */
        h1, h2, .logo-text {
            letter-spacing: -0.01em;
        }
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #FF6B00;
            border-radius: 20px;
        }
        .dark ::-webkit-scrollbar-track {
            background: #1f1f2e;
        }
        /* 折叠卡片动画 */
        .category-content {
            transition: all 0.25s ease-out;
        }
        .category-toggle {
            cursor: pointer;
            user-select: none;
        }
        /* 复制toast */
        .toast-msg {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e2fcc;
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .dark .toast-msg {
            background: #000000aa;
        }
        /* 卡片hover */
        .link-card {
            transition: all 0.2s ease;
        }
        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -12px rgba(0, 0, 0, 0.2);
            border-color: #FF6B00 !important;
        }
        /* 拖拽演示区样式 */
        .drag-demo {
            transition: all 0.2s;
        }
        .drag-demo:active {
            cursor: grabbing;
        }
        /* 移动端调整 */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2rem;
            }
        }
    </style>
    <style>
        /* 暗色类由js切换在html根节点上 */
        .dark body {
            background-color: var(--bg-dark);
            color: var(--text-dark);
        }
        .dark .bg-white, .dark .bg-gray-50, .dark .bg-card-light {
            background-color: var(--card-dark) !important;
        }
        .dark .border-gray-200, .dark .border-gray-100 {
            border-color: #2d2f3a !important;
        }
        .dark .text-gray-600, .dark .text-gray-500 {
            color: #b0b3c0 !important;
        }
        .dark .bg-gray-100 {
            background-color: #1e212a !important;
        }
        .dark .bg-opacity-50 {
            background-color: rgba(0,0,0,0.4);
        }
    </style>
</head>
<body class="bg-[#FEF9F0] dark:bg-[#0A0C12] font-sans antialiased">

    <!-- 全局Toast -->
    <div id="toast" class="toast-msg">✅ 链接已复制</div>

    <!-- 主容器 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 md:py-6">
        <!-- 顶部导航栏 -->
        <nav class="flex flex-wrap items-center justify-between gap-4 py-2 border-b border-gray-200 dark:border-gray-800 pb-4 mb-6">
            <!-- Logo区 -->
            <div class="flex items-center space-x-2">
                <div class="text-3xl drop-shadow-sm">🦞</div>
                <div class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-[#FF6B00] to-orange-500 bg-clip-text text-transparent">Claw123</div>
                <div class="text-sm font-medium text-gray-600 dark:text-gray-400 hidden sm:inline-block ml-1">龙虾导航</div>
            </div>
            
            <!-- 搜索框 (中间) -->
            <div class="flex-grow max-w-md w-full mx-2">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="🔍 搜索站点、分类、标签... (支持中文/英文)" class="w-full py-2.5 pl-4 pr-10 rounded-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-[#151922] shadow-sm focus:outline-none focus:ring-2 focus:ring-[#FF6B00] focus:border-transparent transition">
                    <span class="absolute right-3 top-2.5 text-gray-400">⌘K</span>
                </div>
            </div>
            
            <!-- 右侧功能区 -->
            <div class="flex items-center space-x-3">
                <!-- 深色模式切换 -->
                <button id="darkModeToggle" class="p-2 rounded-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                    <span id="themeIcon" class="text-xl">🌙</span>
                </button>
                <!-- 书签栏提示区: 拖动logo提示 + 快捷键提示 -->
                <div class="hidden md:flex items-center space-x-2 text-xs bg-orange-50 dark:bg-orange-900/30 px-3 py-1.5 rounded-full border border-orange-200 dark:border-orange-800">
                    <span>📌 拖动LOGO到书签栏 →</span>
                    <span class="font-mono bg-white dark:bg-black px-1.5 rounded">⌘/Ctrl+D</span>
                </div>
            </div>
        </nav>
        
        <!-- Hero 英雄区 + 拖拽演示区域 -->
        <div class="relative rounded-3xl bg-gradient-to-br from-orange-50/80 to-amber-50/60 dark:from-gray-900 dark:to-gray-800/60 p-6 md:p-10 mb-12 border border-orange-100 dark:border-gray-700 shadow-xl">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex-1">
                    <h1 class="hero-title text-4xl md:text-5xl font-black text-gray-900 dark:text-white">🦞 畅玩小龙虾，<span class="text-[#FF6B00]">尽在 Claw123</span></h1>
                    <p class="text-gray-600 dark:text-gray-300 text-lg mt-3">OpenClaw 生态一站式聚合平台 · 部署 · 教程 · 技能 · 工具 · 社区</p>
                    <div class="flex flex-wrap gap-3 mt-5">
                        <div class="inline-flex items-center gap-1 bg-white dark:bg-black/40 px-4 py-2 rounded-full shadow-sm text-sm">✨ 实时过滤</div>
                        <div class="inline-flex items-center gap-1 bg-white dark:bg-black/40 px-4 py-2 rounded-full shadow-sm text-sm">📁 自定义收藏</div>
                        <div class="inline-flex items-center gap-1 bg-white dark:bg-black/40 px-4 py-2 rounded-full shadow-sm text-sm">🌗 深色模式</div>
                    </div>
                </div>
                <!-- 拖拽龙虾图标演示区 (可拖拽的svg) -->
                <div class="flex flex-col items-center justify-center bg-orange-100/50 dark:bg-orange-900/20 rounded-2xl p-5 w-40 md:w-48 backdrop-blur-sm">
                    <div id="dragIcon" draggable="true" class="drag-demo cursor-grab active:cursor-grabbing text-7xl drop-shadow-lg transition transform hover:scale-105">🦞</div>
                    <p class="text-xs text-center mt-2 text-gray-700 dark:text-gray-300 font-medium">拖拽小龙虾到书签栏<br>快速收藏本站</p>
                </div>
            </div>
        </div>
        
        <!-- 分类卡片网格 (全部折叠卡片支持) -->
        <div id="categoriesContainer" class="space-y-5"></div>
        
        <!-- 返回顶部按钮 -->
        <button id="backToTop" class="fixed bottom-6 right-6 bg-[#FF6B00] hover:bg-orange-700 text-white p-3 rounded-full shadow-lg transition-all opacity-0 invisible pointer-events-none z-50 w-12 h-12 flex items-center justify-center text-xl">↑</button>
        
        <!-- 页脚 -->
        <footer class="mt-16 pt-8 border-t border-gray-200 dark:border-gray-800 text-center text-gray-500 dark:text-gray-400 text-sm">
            <div class="flex flex-wrap justify-center gap-6 mb-3">
                <span>🐾 openclaw导航</span>
                <span>🦞 龙虾导航</span>
                <span>💬 微信群 (二维码占位)</span>
                <span>📢 公众号 (二维码占位)</span>
            </div>
            <p>Copyright © 2026 Claw123 · Made with ❤️ for OpenClaw 龙虾爱好者</p>
            <div class="flex justify-center gap-4 mt-3 text-xs opacity-70">
                <span>社群入口: 暂缺二维码 · 欢迎贡献</span>
            </div>
        </footer>
    </div>
    
    <script>
        // ----- 完整链接数据库（14个大类，按照题目顺序 + 额外我的常用链接 (localStorage)）
        const baseCategories = [
            { name: "🔥 热门搜索", icon: "🔍", links: [
                { name: "Google", url: "https://www.google.com", tags: "搜索 谷歌" },
                { name: "百度", url: "https://www.baidu.com", tags: "搜索 中文" },
                { name: "GitHub", url: "https://github.com", tags: "代码 开发" },
                { name: "YouTube", url: "https://youtube.com", tags: "视频 教程" }
            ]},
            { name: "🦞 百虾大战", icon: "⚔️", links: [
                { name: "OpenClaw 官网", url: "https://openclaw.ai", tags: "云端 产品" },
                { name: "ClawCloud", url: "https://clawcloud.com", tags: "本地部署 云" },
                { name: "龙虾云引擎", url: "https://lobsterengine.io", tags: "产品列表" }
            ]},
            { name: "☁️ 云端部署", icon: "☁️", links: [
                { name: "阿里云", url: "https://aliyun.com", tags: "云服务器" },
                { name: "腾讯云", url: "https://cloud.tencent.com", tags: "部署" },
                { name: "火山引擎", url: "https://volcengine.com", tags: "云原生" }
            ]},
            { name: "📚 教程合集", icon: "📖", links: [
                { name: "OpenClaw 官方文档", url: "https://docs.openclaw.ai", tags: "教程 入门" },
                { name: "橙皮书 (龙虾圣经)", url: "https://orangebook.claw", tags: "深度" },
                { name: "Hello Claw 中文社区", url: "https://helloclaw.xyz", tags: "博客" }
            ]},
            { name: "🤖 常用AI", icon: "🤖", links: [
                { name: "通义千问", url: "https://tongyi.aliyun.com", tags: "AI 大模型" },
                { name: "豆包", url: "https://doubao.com", tags: "AI 助手" },
                { name: "Kimi", url: "https://kimi.moonshot.cn", tags: "智能助手" },
                { name: "ChatGPT", url: "https://chat.openai.com", tags: "GPT" },
                { name: "Grok", url: "https://grok.x.ai", tags: "xAI" }
            ]},
            { name: "💻 Coding Plan", icon: "💻", links: [
                { name: "Coding.net", url: "https://coding.net", tags: "devops" },
                { name: "StackBlitz", url: "https://stackblitz.com", tags: "在线IDE" }
            ]},
            { name: "🏭 MaaS平台", icon: "🏭", links: [
                { name: "ModelScope", url: "https://modelscope.cn", tags: "模型即服务" },
                { name: "HuggingFace", url: "https://huggingface.co", tags: "AI模型" }
            ]},
            { name: "📊 AI大模型", icon: "📊", links: [
                { name: "LLM 排行榜 (LMSYS)", url: "https://chat.lmsys.org", tags: "排行 评测" },
                { name: "Open LLM Leaderboard", url: "https://huggingface.co/spaces/HuggingFaceH4/open_llm_leaderboard", tags: "开源模型" }
            ]},
            { name: "🛠️ Skills市场", icon: "🛠️", links: [
                { name: "ClawHub", url: "https://clawhub.com", tags: "技能市场 龙虾" },
                { name: "SkillHub", url: "https://skillhub.ai", tags: "AI技能" }
            ]},
            { name: "🌐 Agent生态", icon: "🌐", links: [
                { name: "Agent社交平台", url: "https://agentverse.ai", tags: "社交" },
                { name: "监控管理工具", url: "https://langfuse.com", tags: "监控" }
            ]},
            { name: "💳 Agent支付", icon: "💳", links: [
                { name: "Stripe AI Pay", url: "https://stripe.com", tags: "支付" },
                { name: "Crypto Payment", url: "https://coinbase.com", tags: "加密支付" }
            ]},
            { name: "₿ 币圈生态", icon: "₿", links: [
                { name: "CoinGecko", url: "https://coingecko.com", tags: "加密货币" },
                { name: "DeFiLlama", url: "https://defillama.com", tags: "DeFi" }
            ]}
        ];
        
        // 额外 "我的常用链接" 分类 (支持localStorage增删)
        let userLinks = []; // { name, url, tags }
        function loadUserLinks() {
            const stored = localStorage.getItem("claw123_user_links");
            if(stored) {
                try{
                    userLinks = JSON.parse(stored);
                }catch(e){ userLinks = []; }
            }
            if(userLinks.length === 0){
                userLinks = [
                    { name: "示例: 个人博客", url: "https://example.com", tags: "自定义" },
                    { name: "Claw123 GitHub", url: "https://github.com", tags: "仓库" }
                ];
                saveUserLinks();
            }
        }
        function saveUserLinks() {
            localStorage.setItem("claw123_user_links", JSON.stringify(userLinks));
        }
        
        // 构建完整分类列表 (13个基础+自定义)
        let categories = [...baseCategories];
        // 添加 “我的常用链接” 分类 (支持删除/添加管理界面)
        function refreshCategoriesWithUser() {
            const userCatIndex = categories.findIndex(c => c.name === "📌 我的常用链接");
            if(userCatIndex !== -1) categories.splice(userCatIndex,1);
            categories.push({
                name: "📌 我的常用链接",
                icon: "🔖",
                isUserDefined: true,
                links: userLinks.map(link => ({ ...link }))
            });
        }
        
        // 渲染整个页面
        let currentSearchTerm = "";
        let collapsedState = {}; // 存储折叠状态 key: categoryName
        
        function renderCategories() {
            const container = document.getElementById("categoriesContainer");
            if(!container) return;
            let filteredCats = categories.map(cat => {
                const filteredLinks = cat.links.filter(link => 
                    link.name.toLowerCase().includes(currentSearchTerm.toLowerCase()) ||
                    (link.tags && link.tags.toLowerCase().includes(currentSearchTerm.toLowerCase())) ||
                    (link.url.toLowerCase().includes(currentSearchTerm.toLowerCase()))
                );
                return { ...cat, filteredLinks };
            }).filter(cat => cat.filteredLinks.length > 0 || (currentSearchTerm === "" && cat.links.length===0 && cat.name.includes("我的常用链接")) );
            
            let html = "";
            for(let cat of filteredCats) {
                const catKey = cat.name;
                const isCollapsed = collapsedState[catKey] === true;
                const arrowIcon = isCollapsed ? "▶" : "▼";
                html += `
                    <div class="category-card bg-white dark:bg-[#151922] rounded-2xl shadow-md border border-gray-100 dark:border-gray-800 overflow-hidden transition-all">
                        <div class="category-toggle flex justify-between items-center p-4 md:p-5 bg-gray-50 dark:bg-gray-800/40 border-b border-gray-200 dark:border-gray-700" data-category="${catKey.replace(/"/g, '&quot;')}">
                            <div class="flex items-center gap-2 text-lg font-bold">
                                <span>${cat.icon}</span> <span>${cat.name}</span> <span class="text-xs bg-orange-100 dark:bg-orange-900/50 px-2 py-0.5 rounded-full">${cat.filteredLinks.length}</span>
                            </div>
                            <button class="toggle-btn text-gray-500 dark:text-gray-400 focus:outline-none text-sm w-6 h-6">${arrowIcon}</button>
                        </div>
                        <div class="category-content ${isCollapsed ? 'hidden' : ''} p-4 md:p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                `;
                for(let link of cat.filteredLinks) {
                    html += `
                        <div class="link-card group relative bg-white dark:bg-gray-800/60 rounded-xl border border-gray-200 dark:border-gray-700 p-3 flex justify-between items-center hover:border-[#FF6B00] transition">
                            <a href="${link.url}" target="_blank" rel="noopener noreferrer" class="flex-1 truncate">
                                <div class="font-semibold text-gray-800 dark:text-gray-100 flex items-center gap-1"><span>🔗</span> ${link.name}</div>
                                <div class="text-xs text-gray-500 dark:text-gray-400 truncate">${link.url}</div>
                            </a>
                            <button class="copy-link-btn ml-2 bg-gray-100 dark:bg-gray-700 p-1.5 rounded-full opacity-60 group-hover:opacity-100 transition" data-url="${link.url}" data-name="${link.name}">
                                📋
                            </button>
                        </div>
                    `;
                }
                // 如果是“我的常用链接”分类并且未折叠，额外添加添加按钮区域
                if(cat.name === "📌 我的常用链接" && !isCollapsed) {
                    html += `<div class="col-span-full flex justify-center mt-2 pt-2 border-t border-dashed border-gray-200 dark:border-gray-700">
                                <button id="addUserLinkBtn" class="text-sm bg-orange-100 dark:bg-orange-900/40 px-4 py-2 rounded-full text-[#FF6B00] font-medium flex items-center gap-1">➕ 添加自定义链接</button>
                            </div>`;
                }
                html += `</div></div>`;
            }
            container.innerHTML = html;
            // 重新绑定折叠事件与复制事件
            attachToggleEvents();
            attachCopyEvents();
            if(document.getElementById("addUserLinkBtn")){
                document.getElementById("addUserLinkBtn").addEventListener("click", (e) => {
                    e.preventDefault();
                    let newName = prompt("请输入链接名称:", "我的站点");
                    if(!newName) return;
                    let newUrl = prompt("请输入网址 (包含https://):", "https://");
                    if(!newUrl) return;
                    if(!newUrl.startsWith("http")) newUrl = "https://" + newUrl;
                    userLinks.push({ name: newName, url: newUrl, tags: "自定义" });
                    saveUserLinks();
                    refreshCategoriesWithUser();
                    renderCategories(); // 重绘保持搜索词
                });
            }
        }
        
        function attachToggleEvents() {
            document.querySelectorAll(".category-toggle").forEach(header => {
                const catName = header.getAttribute("data-category");
                const btn = header.querySelector(".toggle-btn");
                const contentDiv = header.parentElement.querySelector(".category-content");
                const toggle = () => {
                    const isNowHidden = contentDiv.classList.contains("hidden");
                    if(isNowHidden) {
                        contentDiv.classList.remove("hidden");
                        collapsedState[catName] = false;
                        if(btn) btn.innerHTML = "▼";
                    } else {
                        contentDiv.classList.add("hidden");
                        collapsedState[catName] = true;
                        if(btn) btn.innerHTML = "▶";
                    }
                };
                header.addEventListener("click", (e) => {
                    if(e.target.closest(".copy-link-btn")) return;
                    toggle();
                });
                if(btn) btn.addEventListener("click", (e) => { e.stopPropagation(); toggle(); });
            });
        }
        
        function attachCopyEvents() {
            document.querySelectorAll(".copy-link-btn").forEach(btn => {
                btn.addEventListener("click", async (e) => {
                    e.stopPropagation();
                    const url = btn.getAttribute("data-url");
                    try {
                        await navigator.clipboard.writeText(url);
                        showToast(`✅ 已复制: ${url}`);
                    } catch(err) {
                        showToast("❌ 复制失败, 手动复制");
                    }
                });
            });
        }
        
        function showToast(msg) {
            const toastEl = document.getElementById("toast");
            toastEl.textContent = msg;
            toastEl.style.opacity = "1";
            setTimeout(() => { toastEl.style.opacity = "0"; }, 2000);
        }
        
        // 搜索过滤
        function initSearch() {
            const searchInput = document.getElementById("searchInput");
            if(!searchInput) return;
            searchInput.addEventListener("input", (e) => {
                currentSearchTerm = e.target.value.trim();
                renderCategories();
            });
            // 快捷键聚焦
            document.addEventListener("keydown", (e) => {
                if((e.metaKey || e.ctrlKey) && e.key === 'k') {
                    e.preventDefault();
                    searchInput.focus();
                }
            });
        }
        
        // 深色模式管理 (跟随系统+手动切换)
        function initDarkMode() {
            const isDark = localStorage.getItem("theme") === "dark" || (window.matchMedia("(prefers-color-scheme: dark)").matches && !localStorage.getItem("theme"));
            if(isDark) {
                document.documentElement.classList.add("dark");
                document.getElementById("themeIcon").innerHTML = "☀️";
            } else {
                document.documentElement.classList.remove("dark");
                document.getElementById("themeIcon").innerHTML = "🌙";
            }
            const toggle = document.getElementById("darkModeToggle");
            toggle.addEventListener("click", () => {
                const isDarkNow = document.documentElement.classList.toggle("dark");
                localStorage.setItem("theme", isDarkNow ? "dark" : "light");
                document.getElementById("themeIcon").innerHTML = isDarkNow ? "☀️" : "🌙";
            });
        }
        
        // 书签拖拽收藏功能: 龙虾图标dragstart setData
        function initDragBookmark() {
            const dragEl = document.getElementById("dragIcon");
            if(dragEl) {
                dragEl.addEventListener("dragstart", (e) => {
                    e.dataTransfer.setData("text/plain", window.location.href);
                    e.dataTransfer.effectAllowed = "copy";
                    dragEl.style.opacity = "0.6";
                });
                dragEl.addEventListener("dragend", () => { dragEl.style.opacity = "1"; });
            }
            // 快捷键收藏提示
            document.addEventListener("keydown", (e) => {
                if((e.metaKey || e.ctrlKey) && e.key === 'd') {
                    e.preventDefault();
                    showToast("✨ 按 Ctrl/Cmd+D 添加书签，记得拖动龙虾图标到书签栏更方便~");
                    // 浏览器默认行为已经阻止，为了让用户可主动添加可以提示标准方法
                    if (window.external && window.external.AddFavorite) {
                        window.external.AddFavorite(location.href, document.title);
                    } else {
                        alert("请手动添加书签: 拖动页面地址到书签栏或按 Ctrl/Cmd+D");
                    }
                }
            });
        }
        
        // 返回顶部逻辑
        function initBackToTop() {
            const btn = document.getElementById("backToTop");
            window.addEventListener("scroll", () => {
                if(window.scrollY > 400) {
                    btn.classList.remove("opacity-0", "invisible", "pointer-events-none");
                    btn.classList.add("opacity-100", "visible", "pointer-events-auto");
                } else {
                    btn.classList.add("opacity-0", "invisible", "pointer-events-none");
                    btn.classList.remove("opacity-100", "visible", "pointer-events-auto");
                }
            });
            btn.addEventListener("click", () => {
                window.scrollTo({ top: 0, behavior: "smooth" });
            });
        }
        
        // 初始化我的常用
        function init() {
            loadUserLinks();
            refreshCategoriesWithUser();
            renderCategories();
            initSearch();
            initDarkMode();
            initDragBookmark();
            initBackToTop();
            // 预设所有分类默认展开（折叠状态全false）
            for(let cat of categories) {
                if(collapsedState[cat.name] === undefined) collapsedState[cat.name] = false;
            }
            renderCategories();
        }
        
        init();
    </script>
</body>
</html>
